name: DevSecOps Portfolio Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"
          generateSarif: "1"
      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  sca-scan:
    name: Dependency Scan (Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements.txt

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Note: In a real project, we would use a gitleaks.toml config

  container-scan:
    name: Container Security (Trivy)
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan, secret-scan]
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t centra:${{ github.sha }} .
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'centra:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fail on vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  sbom-generation:
    name: SBOM Generation (Syft)
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t centra:${{ github.sha }} .
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: centra:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.json
      - name: Archive SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json

  push-to-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: sbom-generation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/centra:latest
